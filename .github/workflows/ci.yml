name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff mypy
      - run: ruff check Library/
      - run: mypy Library/ --ignore-missing-imports

  unit-tests:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install pinned dev dependencies
        run: pip install -r requirements-dev.txt && pip install -e "." --no-deps
      - name: Run unit tests
        run: pytest Tests/Library/Components/ -v --tb=short

  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: unit-tests
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: syncdb
          POSTGRES_PASSWORD: syncdb
          POSTGRES_DB: syncdb_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: syncdb
          MYSQL_DATABASE: syncdb_test
          MYSQL_USER: syncdb
          MYSQL_PASSWORD: syncdb
        ports: ["3306:3306"]
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dev dependencies
        run: pip install -e ".[dev]"
      - name: Run database integration tests
        env:
          SYNCDB_PG_HOST: localhost
          SYNCDB_PG_USER: syncdb
          SYNCDB_PG_PASSWORD: syncdb
          SYNCDB_PG_DATABASE: syncdb_test
          SYNCDB_MYSQL_HOST: localhost
          SYNCDB_MYSQL_USER: syncdb
          SYNCDB_MYSQL_PASSWORD: syncdb
          SYNCDB_MYSQL_DATABASE: syncdb_test
        run: pytest Tests/Library/DatabaseToDatabase/ -v --tb=short
        continue-on-error: true
