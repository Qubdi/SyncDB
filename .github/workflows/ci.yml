name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install "ruff>=0.4"
      - name: Ruff check
        run: ruff check Library/ Tests/
      - name: Ruff format check
        run: ruff format --check Library/ Tests/

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install mypy and stubs
        run: pip install "mypy>=1.10" "pandas-stubs" "types-openpyxl"
      - name: Install package (core only)
        run: pip install -e .
      - name: mypy
        run: mypy Library/

  unit-tests:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dev dependencies
        run: pip install -e ".[dev]"
      - name: Run unit tests (no Docker required)
        run: |
          pytest \
            Tests/Library/Components/config \
            Tests/Library/Components/connectors \
            Tests/Library/Components/files \
            Tests/Library/Components/progress \
            Tests/Library/Components/sql \
            Tests/Library/Components/sync \
            Tests/Library/Components/type_mapping \
            -v

  integration-tests:
    name: Integration tests (DB matrix)
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dev dependencies
        run: pip install -e ".[dev]"
      - name: Start database containers
        run: docker compose -f Tests/DataBase/docker-compose.yml up -d --build
        working-directory: ${{ github.workspace }}
      - name: Wait for databases to be healthy
        run: |
          echo "Waiting for DB containers..."
          sleep 60
      - name: Run integration tests
        run: pytest Tests/Library/DatabaseToDatabase -v
      - name: Stop containers
        if: always()
        run: docker compose -f Tests/DataBase/docker-compose.yml down -v
