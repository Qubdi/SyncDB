# Local quality gates — install once with:  pip install pre-commit && pre-commit install
# Mirrors the manual commands in CLAUDE.md (ruff check/format Library/, mypy Library/)
# so nothing correctness-sensitive lands in a commit unchecked.

# Install every hook type this config uses in one `pre-commit install` —
# without this, the pre-push and commit-msg hooks silently never run.
default_install_hook_types: [pre-commit, commit-msg, pre-push]
# Hooks without an explicit `stages:` run only at commit time; the commit-msg
# and pre-push hooks below opt in to their stages explicitly.
default_stages: [pre-commit]

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
        files: ^Library/

  - repo: local
    hooks:
      # Conventional Commits subject check — "update" commits defeat git
      # bisect/blame on a published package; see Tools/check_commit_message.py.
      - id: commit-message-format
        name: commit message format (Conventional Commits)
        entry: python Tools/check_commit_message.py
        language: system
        stages: [commit-msg]

      - id: mypy-library
        name: mypy --strict on Library/
        entry: python -m mypy Library/
        language: system
        pass_filenames: false
        files: ^Library/

      - id: component-tests
        name: component test suite (fast, no DB)
        entry: python -m pytest Tests/Library/Components -q
        language: system
        pass_filenames: false
        stages: [pre-push]

      # Dependency vulnerability scan.  Manual stage so it doesn't slow every
      # commit — run before releases with:  pre-commit run pip-audit --hook-stage manual
      - id: pip-audit
        name: pip-audit dependency scan
        entry: python -m pip_audit
        language: system
        pass_filenames: false
        stages: [manual]
