services:
  mssql:
    build:
      context: ./images/mssql
    image: qubdi-syncdb-mssql:latest
    container_name: Qubdi-SyncDB-mssql
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "SyncDB_Strong_Passw0rd!"
      MSSQL_PID: "Developer"
    ports:
      - "11433:1433"
    volumes:
      - mssql-data:/var/opt/mssql

  mssql-init:
    build:
      context: ./images/mssql-tools
    image: qubdi-syncdb-mssql-tools:latest
    container_name: Qubdi-SyncDB-mssql-init
    depends_on:
      - mssql
    environment:
      SA_PASSWORD: "SyncDB_Strong_Passw0rd!"
    volumes:
      - ./seed/mssql:/seed:ro
    command: bash /seed/init.sh
    restart: "no"

  postgres:
    build:
      context: ./images/postgres
    image: qubdi-syncdb-postgres:latest
    container_name: Qubdi-SyncDB-postgres
    environment:
      POSTGRES_USER: "syncdb"
      POSTGRES_PASSWORD: "syncdb"
      POSTGRES_DB: "syncdb_test"
    ports:
      - "15432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./seed/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U syncdb -d syncdb_test"]
      interval: 10s
      timeout: 5s
      retries: 10

  mysql:
    build:
      context: ./images/mysql
    image: qubdi-syncdb-mysql:latest
    container_name: Qubdi-SyncDB-mysql
    environment:
      MYSQL_ROOT_PASSWORD: "root"
      MYSQL_DATABASE: "syncdb_test"
      MYSQL_USER: "syncdb"
      MYSQL_PASSWORD: "syncdb"
    ports:
      - "13306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./seed/mysql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  postgres-ide:
    build:
      context: ./images/pgadmin
    image: qubdi-syncdb-pgadmin:latest
    container_name: Qubdi-SyncDB-postgres-ide
    depends_on:
      - postgres
    environment:
      PGADMIN_DEFAULT_EMAIL: "admin@qubdi.local"
      PGADMIN_DEFAULT_PASSWORD: "syncdb"
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "18080:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin

  mysql-ide:
    build:
      context: ./images/phpmyadmin
    image: qubdi-syncdb-phpmyadmin:latest
    container_name: Qubdi-SyncDB-mysql-ide
    depends_on:
      - mysql
    environment:
      PMA_HOST: "mysql"
      PMA_PORT: "3306"
      PMA_USER: "syncdb"
      PMA_PASSWORD: "syncdb"
      UPLOAD_LIMIT: "512M"
    ports:
      - "18081:80"

  mssql-ide:
    build:
      context: ./images/cloudbeaver
    image: qubdi-syncdb-cloudbeaver:latest
    container_name: Qubdi-SyncDB-mssql-ide
    depends_on:
      - mssql
    ports:
      - "18082:8978"
    volumes:
      - cloudbeaver-data:/opt/cloudbeaver/workspace

volumes:
  mssql-data:
  postgres-data:
  mysql-data:
  pgadmin-data:
  cloudbeaver-data:
