services:

  # Main SQL Server test database.
  # Use admin/admin for normal API and IDE connections.
  # Admin123! is only the internal sa bootstrap password required by SQL Server.
  mssql:
    build:
      context: ./images/mssql
    image: qubdi-syncdb-mssql:2022-CU23-ubuntu-22.04
    container_name: Qubdi-SyncDB-mssql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Admin123!"
      MSSQL_PID: "Developer"
    ports:
      - "11433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      test: [ "CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -C -S localhost -U sa -P 'Admin123!' -Q 'SELECT 1' || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  # One-shot SQL Server seed job. Runs automatically during `docker compose up -d --build`.
  # The completed container remains Exited (0) so logs are available after startup.
  mssql-init:
    build:
      context: ./images/mssql-tools
    image: qubdi-syncdb-mssql-tools:2022-CU23-ubuntu-22.04
    container_name: Qubdi-SyncDB-mssql-init
    depends_on:
      mssql:
        condition: service_healthy
    environment:
      MSSQL_SA_PASSWORD: "Admin123!"
    volumes:
      - ./seed/mssql:/seed:ro
    command: bash /seed/init.sh
    restart: "no"

  # Main PostgreSQL test database.
  # Seed scripts are loaded automatically on first volume creation.
  postgres:
    build:
      context: ./images/postgres
    image: qubdi-syncdb-postgres:18.3
    container_name: Qubdi-SyncDB-postgres
    environment:
      POSTGRES_USER: "admin"
      POSTGRES_PASSWORD: "admin"
      POSTGRES_DB: "syncdb_test"
    ports:
      - "15432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
      - ./seed/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d syncdb_test"]
      interval: 10s
      timeout: 5s
      retries: 10

  # Main MySQL test database.
  # Seed scripts are loaded automatically on first volume creation.
  mysql:
    build:
      context: ./images/mysql
    image: qubdi-syncdb-mysql:9.7.0
    container_name: Qubdi-SyncDB-mysql
    environment:
      MYSQL_ROOT_PASSWORD: "admin"
      MYSQL_DATABASE: "syncdb_test"
      MYSQL_USER: "admin"
      MYSQL_PASSWORD: "admin"
    ports:
      - "13306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./seed/mysql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: [ "CMD-SHELL", "mysql --protocol=tcp -h 127.0.0.1 -uadmin -padmin syncdb_test -e 'SELECT 1' >/dev/null 2>&1 || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 10

  # Browser IDE for PostgreSQL.
  # Open http://localhost:18080 and log in with admin@admin.com/admin.
  postgres-ide:
    build:
      context: ./images/pgadmin
    image: qubdi-syncdb-pgadmin:9.14.0
    container_name: Qubdi-SyncDB-postgres-ide
    depends_on:
      - postgres
    environment:
      PGADMIN_DEFAULT_EMAIL: "admin@admin.com"
      PGADMIN_DEFAULT_PASSWORD: "admin"
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "18080:80"
    volumes:
      - pgadmin-data:/var/lib/pgadmin

  # Browser IDE for MySQL.
  # Open http://localhost:18081 and log in with admin/admin.
  mysql-ide:
    build:
      context: ./images/phpmyadmin
    image: qubdi-syncdb-phpmyadmin:5.2.3
    container_name: Qubdi-SyncDB-mysql-ide
    depends_on:
      - mysql
    environment:
      PMA_HOST: "mysql"
      PMA_PORT: "3306"
      PMA_USER: "admin"
      PMA_PASSWORD: "admin"
      UPLOAD_LIMIT: "512M"
    ports:
      - "18081:80"

  # Browser IDE for MSSQL.
  # Open http://localhost:18082 and create a SQL Server connection with admin/admin.
  mssql-ide:
    build:
      context: ./images/cloudbeaver
    image: qubdi-syncdb-cloudbeaver:26.0.3
    container_name: Qubdi-SyncDB-mssql-ide
    depends_on:
      mssql:
        condition: service_healthy
    ports:
      - "18082:8978"
    volumes:
      - cloudbeaver-data:/opt/cloudbeaver/workspace

  # One-shot data validation job. Runs automatically after all seed jobs finish.
  # The container exits 0 when seeded row counts match, otherwise exits non-zero.
  data-check:
    build:
      context: ./images/data-check
    image: qubdi-syncdb-data-check:1.0.0
    container_name: Qubdi-SyncDB-data-check
    depends_on:
      mssql-init:
        condition: service_completed_successfully
      mssql:
        condition: service_healthy
      postgres:
        condition: service_healthy
      mysql:
        condition: service_healthy
    environment:
      MSSQL_HOST: "mssql"
      MSSQL_PORT: "1433"
      MSSQL_USER: "admin"
      MSSQL_PASSWORD: "admin"
      MSSQL_DATABASE: "syncdb_test"
      POSTGRES_HOST: "postgres"
      POSTGRES_PORT: "5432"
      POSTGRES_USER: "admin"
      POSTGRES_PASSWORD: "admin"
      POSTGRES_DATABASE: "syncdb_test"
      MYSQL_HOST: "mysql"
      MYSQL_PORT: "3306"
      MYSQL_USER: "admin"
      MYSQL_PASSWORD: "admin"
      MYSQL_DATABASE: "syncdb_test"
      FORCE_COLOR: "1"
    restart: "no"

# Named volumes keep database and IDE state between restarts.
# Use `docker compose down -v` to delete all data and reseed from scratch.
volumes:
  mssql-data:
  postgres-data:
  mysql-data:
  pgadmin-data:
  cloudbeaver-data:



